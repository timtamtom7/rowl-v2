name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: x64
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install

      - name: Build desktop
        run: bun run build

      - name: Build macOS
        if: matrix.platform == 'mac'
        run: bun run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Windows
        if: matrix.platform == 'win'
        run: bun run dist:win

      - name: Upload artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            apps/electron/release/*.dmg
            apps/electron/release/*.zip
            apps/electron/release/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
